<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivum Arcano: Nexus Finalis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg-deep: #050507; }
        * { -webkit-user-select: none; user-select: none; outline: none; }
        body {
            background-color: var(--bg-deep);
            color: #d1d1d6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(197, 160, 89, 0.05) 0%, transparent 80%);
            min-height: 100vh;
        }
        .cinzel { font-family: 'Cinzel', serif; }
        .layer {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--bg-deep);
            z-index: 1000;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .layer.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        .arcane-btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            background: rgba(197, 160, 89, 0.05);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-radius: 2px;
        }
        .arcane-btn:hover:not(:disabled) { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }
        .arcane-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .error-msg { color: #ff4444; font-size: 10px; font-family: 'Cinzel', serif; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Capa de Carga y Errores Críticos -->
    <div id="loading-screen" class="layer">
        <div id="loader-spinner" class="w-12 h-12 border-2 border-gold/10 border-t-gold rounded-full animate-spin mb-6"></div>
        <p id="loader-text" class="cinzel text-[10px] text-gold tracking-[0.4em] uppercase">Sincronizando Frecuencia...</p>
        <div id="setup-error" class="error-msg hidden px-10 text-center"></div>
    </div>

    <!-- Interfaz de Autenticación -->
    <section id="layer-auth" class="layer hidden">
        <div class="max-w-md w-full text-center px-6">
            <h2 class="cinzel text-gold text-3xl mb-2 tracking-[0.6em]">NEXUS</h2>
            <p class="spectral italic text-gray-600 mb-16 text-xs uppercase tracking-widest">Identificación de Iniciado</p>
            
            <button id="google-btn" onclick="handleGoogleSignIn()" class="arcane-btn w-full mb-6">
                Acceder con Google
            </button>
            
            <p id="auth-status" class="text-[9px] cinzel text-white/30 uppercase tracking-[0.2em]"></p>
        </div>
    </section>

    <!-- UI Principal Post-Login -->
    <div id="main-ui" class="hidden opacity-0 transition-opacity duration-1000 p-10 md:p-32 text-center">
        <header class="mb-20">
            <h1 class="cinzel text-white text-4xl md:text-6xl tracking-[0.4em] font-bold">ACCESO CONCEDIDO</h1>
            <div class="w-20 h-px bg-gold/30 mx-auto my-8"></div>
            <p id="user-info" class="cinzel text-[10px] text-gold tracking-widest uppercase"></p>
        </header>
        
        <div class="max-w-xl mx-auto glass-card border border-gold/10 p-10 bg-white/5 backdrop-blur-md">
            <p class="spectral italic text-gray-400">"El conocimiento es la única llave que no pesa."</p>
        </div>

        <button onclick="handleSignOut()" class="mt-32 text-red-900/50 hover:text-red-600 cinzel text-[10px] tracking-widest uppercase transition-colors">
            Cerrar Conexión
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signInWithRedirect, 
            getRedirectResult, 
            GoogleAuthProvider, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Función para obtener variables con seguridad
        const getEnv = (key) => {
            try {
                return import.meta.env[key] || null;
            } catch (e) {
                return null;
            }
        };

        const config = {
            apiKey: getEnv('VITE_FIREBASE_API_KEY'),
            authDomain: getEnv('VITE_FIREBASE_AUTH_DOMAIN'),
            projectId: getEnv('VITE_FIREBASE_PROJECT_ID'),
            storageBucket: getEnv('VITE_FIREBASE_STORAGE_BUCKET'),
            messagingSenderId: getEnv('VITE_FIREBASE_MESSAGING_SENDER_ID'),
            appId: getEnv('VITE_FIREBASE_APP_ID')
        };

        const setupErrorEl = document.getElementById('setup-error');
        const loaderText = document.getElementById('loader-text');

        // Verificación de integridad de variables
        const missingKeys = Object.keys(config).filter(k => !config[k]);
        
        if (missingKeys.length > 0) {
            document.getElementById('loader-spinner').style.display = 'none';
            loaderText.innerText = "FALLO DE CONFIGURACIÓN";
            setupErrorEl.innerHTML = `Variables faltantes o mal configuradas en Vercel:<br><span class="text-white mt-2 block">${missingKeys.join(', ')}</span><br><br>Asegúrate de que tengan el prefijo VITE_`;
            setupErrorEl.classList.remove('hidden');
        } else {
            // Inicializar Firebase solo si la config está completa
            try {
                const app = initializeApp(config);
                const auth = getAuth(app);
                const googleProvider = new GoogleAuthProvider();

                // Manejo de redirección
                getRedirectResult(auth).then(() => {
                    console.log("Redirección completada");
                }).catch((error) => {
                    console.error("Error Auth:", error);
                    const status = document.getElementById('auth-status');
                    status.innerText = "Error: Dominio no autorizado o problema de red.";
                });

                // Observador de estado
                onAuthStateChanged(auth, (user) => {
                    document.getElementById('loading-screen').classList.add('hidden');
                    if (user) {
                        document.getElementById('layer-auth').classList.add('hidden');
                        document.getElementById('main-ui').classList.remove('hidden');
                        setTimeout(() => document.getElementById('main-ui').classList.add('opacity-100'), 50);
                        document.getElementById('user-info').innerText = "IDENTIDAD: " + user.email;
                    } else {
                        document.getElementById('layer-auth').classList.remove('hidden');
                        document.getElementById('main-ui').classList.add('hidden');
                    }
                });

                window.handleGoogleSignIn = () => {
                    document.getElementById('google-btn').disabled = true;
                    document.getElementById('auth-status').innerText = "REDIRECCIONANDO...";
                    signInWithRedirect(auth, googleProvider);
                };

                window.handleSignOut = () => {
                    signOut(auth).then(() => {
                        window.location.reload();
                    });
                };

            } catch (err) {
                console.error("Firebase Init Error:", err);
                loaderText.innerText = "ERROR DE INICIALIZACIÓN";
                setupErrorEl.innerText = err.message;
                setupErrorEl.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
